<div class="container">
  <label>Enter your age</label>
  <input type="number" min="0" [(ngModel)]="age" (input)="checkEligibility()" />
  <div class="message">
    @switch (isEligible) {
      @case (true) {
        <p class="eligible">You are eligible to vote</p>
      }
      @default {
        <p class="not-eligible">You are not eligible to vote!</p>
      }
    }
  </div>
</div>
