<div class="container">
  <label>Enter your age</label>
  <input type="number" min="0" [(ngModel)]="age" (input)="checkEligibility()" />
  <div [ngSwitch]="isEligible" class="message">
    <p *ngSwitchCase="true" class="eligible">You are eligible to vote</p>
    <p *ngSwitchDefault class="not-eligible">You are not eligible to vote!</p>
  </div>
</div>
